---
- name: Deploy StudyHive backend demo with PM2
  hosts: studyhive_backend
  become: true

  vars:
    studyhive_repo_url: "https://github.com/MrScurra/studyhive-saas.git"
    studyhive_repo_version: "main"
    studyhive_app_dir: "/opt/studyhive"
    studyhive_backend_dir: "{{ studyhive_app_dir }}/backend"
    pm2_app_name: "studyhive-backend"
    node_major_version: "20"
    backend_port: "5000"
    frontend_origin: "https://YOUR_FRONTEND_DOMAIN.example"
    firebase_project_id: "study-collab-saas-js"
    firebase_service_account_base64: "PLACEHOLDER_FIREBASE_SERVICE_ACCOUNT_BASE64"
    brevo_api_key: "PLACEHOLDER_BREVO_API_KEY"
    brevo_sender_email: "no-reply@example.com"
    brevo_sender_name: "StudyHive"

  tasks:
    - name: Update apt package index
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
        state: present

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add NodeSource signing key
      ansible.builtin.get_url:
        url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
        dest: /etc/apt/keyrings/nodesource.gpg
        mode: "0644"

    - name: Add NodeSource apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
        state: present
        filename: nodesource
        update_cache: true

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present

    - name: Install PM2 globally
      ansible.builtin.npm:
        name: pm2
        global: true
        state: present

    - name: Ensure StudyHive app directory exists
      ansible.builtin.file:
        path: "{{ studyhive_app_dir }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0755"

    - name: Clone or update StudyHive repository
      ansible.builtin.git:
        repo: "{{ studyhive_repo_url }}"
        dest: "{{ studyhive_app_dir }}"
        version: "{{ studyhive_repo_version }}"
        update: true
        force: false
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Install backend npm dependencies
      ansible.builtin.command: npm install
      args:
        chdir: "{{ studyhive_backend_dir }}"
      changed_when: true
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Create backend environment file from Ansible variables
      ansible.builtin.copy:
        dest: "{{ studyhive_backend_dir }}/.env"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: "0600"
        content: |
          NODE_ENV=production
          PORT={{ backend_port }}
          FIREBASE_PROJECT_ID={{ firebase_project_id }}
          FIREBASE_SERVICE_ACCOUNT_BASE64={{ firebase_service_account_base64 }}
          FRONTEND_ORIGIN={{ frontend_origin }}
          UPLOADS_DIR=./uploads
          BREVO_API_KEY={{ brevo_api_key }}
          BREVO_SENDER_EMAIL={{ brevo_sender_email }}
          BREVO_SENDER_NAME={{ brevo_sender_name }}

    - name: Check whether StudyHive backend is already registered in PM2
      ansible.builtin.command: "pm2 describe {{ pm2_app_name }}"
      register: pm2_describe
      changed_when: false
      failed_when: false
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Start StudyHive backend with PM2
      ansible.builtin.command: "pm2 start server.js --name {{ pm2_app_name }} --update-env"
      args:
        chdir: "{{ studyhive_backend_dir }}"
      when: pm2_describe.rc != 0
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Restart StudyHive backend with PM2
      ansible.builtin.command: "pm2 restart {{ pm2_app_name }} --update-env"
      args:
        chdir: "{{ studyhive_backend_dir }}"
      when: pm2_describe.rc == 0
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Save PM2 process list
      ansible.builtin.command: pm2 save
      changed_when: true
      become_user: "{{ ansible_user | default('ubuntu') }}"
